name: Release

on:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  # https://docs.npmjs.com/generating-provenance-statements#publishing-packages-with-provenance-via-github-actions
  id-token: write

env:
  CI: true
  NODE_VERSION: 24

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Use cached node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-${{ env.NODE_VERSION }}-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            nodeModules-

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: |
          npm run test || npm run test || npm run test || exit 1

      - name: Calculate release variables
        id: release
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            echo "kind=tag" >> "$GITHUB_OUTPUT"
            echo "TAG_NAME=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
            echo "RELEASE_CHANNEL=$(npm run --silent release-channel -- \"${{ github.event.release.tag_name }}\")" >> "$GITHUB_ENV"
            echo "PACKAGE_PATH=$(npm run --silent package-path -- \"${{ github.event.release.tag_name }}\")" >> "$GITHUB_ENV"
          else
            echo "kind=insiders" >> "$GITHUB_OUTPUT"
            echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          fi

      - name: Version insiders packages
        if: steps.release.outputs.kind == 'insiders'
        run: npm version -w packages 0.0.0-insiders.${{ env.SHA_SHORT }} --force --no-git-tag-version

      - name: Publish insiders
        if: steps.release.outputs.kind == 'insiders'
        run: npm publish -w packages --provenance --tag insiders

      - name: Publish tagged release
        if: steps.release.outputs.kind == 'tag'
        run: npm publish ${{ env.PACKAGE_PATH }} --provenance --tag ${{ env.RELEASE_CHANNEL }}
